<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="./dist/output.css" rel="stylesheet">
  <link href="./components/style.css" rel="stylesheet">
</head>
<body class="bg-[#0e0e0e] min-h-screen font-sans text-white background"
  style="background-image: radial-gradient(ellipse 60% 80% at 50% 30%, #2a2a2a 0%, #161616 85%, #0a0a0a 100%)">

  <!-- NAVBAR -->
  <nav class="sticky top-0 flex items-center justify-between px-6 py-6 sm:px-12 nav-bar">

    <!-- Left: Name -->
    <div class="name"> <!-- Hides name in small screens-->
      <p class="text-white text-xl font-semibold tracking-tight">Radzmer Akalani</p>
      <p class="text-white/35 text-sm mt-0.5">Software Developer</p>
    </div>

    <!-- Center: Glass Toggle -->
    <div class="flex flex-col items-center gap-1.5">
      <div class="relative flex bg-white/7 backdrop-blur-md border border-white/12 rounded-full p-1 gap-0.5">
        
        <div
          id="sliding-pill"
          class="absolute top-1 left-1 w-4 h-4 rounded-2xl bg-white/10 backdrop-blur-sm border border-white/25 transition-all duration-300 ease-in-out shadow-lg"
        ></div>

        <button id="btn-work" onclick="switchTab('work')"
          class="relative z-10 px-5 py-1.5 rounded-full text-[13px] text-white transition-colors duration-300 cursor-pointer">
          Work
        </button>
        <button id="btn-info" onclick="switchTab('info')"
          class="relative z-10 px-5 py-1.5 rounded-full text-[13px] text-white/45 transition-colors duration-300 cursor-pointer">
          Info
        </button>

      </div>
    </div>

    <!-- Right: Desktop Links (hidden on mobile) -->
    <div class="hidden sm:flex items-center gap-6">
      <a href="#" class="text-white transition-colors rounded-lg px-3 py-2 hover:text-white hover:bg-white/10 hover:border hover:border-white/20 hover:backdrop-blur-md">
        GitHub <span class="text-[10px]">↗</span>
      </a>
      <a href="#" class="text-white transition-colors rounded-lg px-3 py-2 hover:text-white hover:bg-white/10 hover:border hover:border-white/20 hover:backdrop-blur-md">
        Resume <span class="text-[10px]">↗</span>
      </a>
    </div>

    <!-- Right: Mobile Dropdown (hidden on desktop) -->
    <div class="relative sm:hidden">
      <button onclick="toggleDropdown()"
        class="w-12 h-12 pb-1 rounded-full bg-white/8 border border-white/15 text-white text-2xl flex items-center justify-center backdrop-blur-md hover:bg-white/15 transition-colors">
        @
      </button>
      <div id="dropdown"
        class="hidden absolute right-0 top-[calc(100%+10px)] bg-[rgba(30,30,30,0.85)] backdrop-blur-xl border border-white/12 rounded-2xl p-1.5 min-w-35 flex-col gap-0.5">
        <a href="#"
          class="flex items-center justify-between px-3.5 py-2 rounded-lg text-[13px] text-white/75 hover:bg-white/8 hover:text-white transition-colors">
          LinkedIn <span class="text-[12px] opacity-50">↗</span>
        </a>
        <a href="#"
          class="flex items-center justify-between px-3.5 py-2 rounded-lg text-[13px] text-white/75 hover:bg-white/8 hover:text-white transition-colors">
          Resume <span class="text-[12px] opacity-50">↗</span>
        </a>
      </div>
    </div>

  </nav>

  <!-- TV / MAC WINDOW -->
  <div class="flex justify-center px-5 mt-18">
    <div class="tv-container rounded-2xl border border-white/10 p-1 tv-frame relative">
      <div class="tv-loader" id="tv-loader"></div>
      <div class="success-indicator" id="success-indicator"></div>
      <div class="w-full max-w-4xl border border-white/10 rounded-2xl overflow-hidden"
        style="box-shadow: 0 0 0 0.5px rgba(0,0,0,0.6), 0 32px 80px rgba(0,0,0,0.6)">

    <!-- Title Bar -->
    <div class="items-center justify-between px-4 py-3 border-b border-black/40 hidden min-[512px]:block"
      style="background: radial-gradient(circle at center, rgba(255, 255, 255, 0.7) 0%, rgba(210,210,210,0.15) 100%);">
      <div class="flex items-center gap-2 p-1.5">
        <div class="w-3.25 h-3.25 rounded-full bg-[#ff5f57]"></div>
        <div class="w-3.25 h-3.25 rounded-full bg-[#febc2e]"></div>
        <div class="w-3.25 h-3.25 rounded-full bg-[#28c840]"></div>
      </div>
    </div>

    <!-- Content -->
    <div class="bg-transparent px-12 pt-14 pb-16 sm:px-12">
      <p class="text-white/50 text-xl tracking-tight name-sm-screen">• Radzmer Akalani - Software Developer</p>
      <h1 class="text-[clamp(36px,6vw,68px)] font-semibold leading-[1.05] tracking-[-0.02em] mb-6" style="text-shadow: 0 0 20px rgba(255, 255, 255, 0.3), 0 0 40px rgba(255, 255, 255, 0.15)">
        I Craft Programs,<br />
        Interactions &amp;
        <span class="font-serif italic font-normal text-white/55">Stories.</span>
      </h1>
      <div class="sm:ml-auto sm:max-w-60 text-[14px] leading-relaxed">
        <p class="text-white/80">Information Technology Student.</p>
        <p class="text-white/50">Studying in Holy Trinity University.</p>
      </div>
      <div class="bouncingArrow cursor-pointer" onclick="slowContinuousScroll()">
        ↓
      </div>
    </div>
  </div>

  </div>
  <script src="./components/script.js"></script>
</body>
</html>
